services:
  db:
    image: postgres:16
    container_name: ldm_steel_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ldm_steel
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d ldm_steel']
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        DATABASE_URL: ${BUILD_DATABASE_URL:-postgresql://postgres:postgres@db:5432/ldm_steel?schema=public}
    container_name: ldm_steel_app
    restart: unless-stopped
    ports:
      - '3000:3000'
    env_file:
      - path: .env.production
        required: false
    environment:
      DATABASE_URL: ${APP_DATABASE_URL:-postgresql://postgres:postgres@db:5432/ldm_steel?schema=public}
      NODE_ENV: production
      PORT: 3000
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'curl -f http://localhost:3000/api/health || exit 1']
      interval: 15s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
